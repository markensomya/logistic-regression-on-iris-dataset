<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iris Flower Classifier</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #e0f7e9, #f0f4ff);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      color: #2e7d32;
      margin-bottom: 8px;
      font-size: 1.6rem;
    }

    p.subtitle {
      text-align: center;
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: #555;
      margin-bottom: 4px;
      margin-top: 14px;
    }

    input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      transition: border 0.2s;
    }

    input:focus {
      outline: none;
      border-color: #4caf50;
    }

    button {
      width: 100%;
      margin-top: 24px;
      padding: 12px;
      background: #4caf50;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #388e3c; }

    #result {
      margin-top: 20px;
      text-align: center;
      font-size: 1.1rem;
      font-weight: 600;
      color: #2e7d32;
      min-height: 28px;
    }

    #result.error { color: #c62828; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🌸 Iris Classifier</h1>
    <p class="subtitle">Enter flower measurements to predict the species</p>

    <label>Sepal Length (cm)</label>
    <input type="number" id="sepal_length" step="0.1" placeholder="e.g. 5.1" />

    <label>Sepal Width (cm)</label>
    <input type="number" id="sepal_width" step="0.1" placeholder="e.g. 3.5" />

    <label>Petal Length (cm)</label>
    <input type="number" id="petal_length" step="0.1" placeholder="e.g. 1.4" />

    <label>Petal Width (cm)</label>
    <input type="number" id="petal_width" step="0.1" placeholder="e.g. 0.2" />

    <button onclick="predict()">Predict</button>

    <div id="result"></div>
  </div>

  <script>
    async function predict() {
      const result = document.getElementById("result");
      const data = {
        sepal_length: parseFloat(document.getElementById("sepal_length").value),
        sepal_width:  parseFloat(document.getElementById("sepal_width").value),
        petal_length: parseFloat(document.getElementById("petal_length").value),
        petal_width:  parseFloat(document.getElementById("petal_width").value),
      };

      if (Object.values(data).some(isNaN)) {
        result.textContent = "Please fill in all fields.";
        result.className = "error";
        return;
      }

      try {
        const res = await fetch("/predict", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });
        const json = await res.json();
        result.textContent = "Prediction: " + json.prediction.charAt(0).toUpperCase() + json.prediction.slice(1);
        result.className = "";
      } catch (err) {
        result.textContent = "Error connecting to API.";
        result.className = "error";
      }
    }
  </script>
</body>
</html>
